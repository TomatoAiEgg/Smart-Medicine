server:
  port: ${GATEWAY_PORT:18080}

spring:
  application:
    name: gateway
  datasource:
    url: jdbc:postgresql://${ZHYF_DB_HOST:100.115.165.51}:${ZHYF_DB_PORT:15432}/${ZHYF_DB_NAME:zhyf_saas}
    username: ${ZHYF_DB_USERNAME:postgres}
    password: ${ZHYF_DB_PASSWORD:123456}

zhyf:
  gateway:
    auth-institution-base-url: ${AUTH_INSTITUTION_BASE_URL:http://localhost:18081}
    order-service-base-url: ${ORDER_SERVICE_BASE_URL:http://localhost:18082}
    signature-timeout-seconds: ${GATEWAY_SIGNATURE_TIMEOUT_SECONDS:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info
