server:
  port: ${CALLBACK_SERVICE_PORT:18089}

spring:
  application:
    name: callback-service
  datasource:
    url: jdbc:postgresql://${ZHYF_DB_HOST:100.115.165.51}:${ZHYF_DB_PORT:15432}/${ZHYF_DB_NAME:zhyf_saas}
    username: ${ZHYF_DB_USERNAME:postgres}
    password: ${ZHYF_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: Asia/Hong_Kong

management:
  endpoints:
    web:
      exposure:
        include: health,info

zhyf:
  callback:
    dispatch-enabled: ${ZHYF_CALLBACK_DISPATCH_ENABLED:false}
    dispatch-fixed-delay-ms: ${ZHYF_CALLBACK_DISPATCH_FIXED_DELAY_MS:5000}
    dispatch-batch-size: ${ZHYF_CALLBACK_DISPATCH_BATCH_SIZE:20}
    max-retries: ${ZHYF_CALLBACK_MAX_RETRIES:5}
    initial-retry-delay-seconds: ${ZHYF_CALLBACK_INITIAL_RETRY_DELAY_SECONDS:60}
    max-retry-delay-seconds: ${ZHYF_CALLBACK_MAX_RETRY_DELAY_SECONDS:1800}
